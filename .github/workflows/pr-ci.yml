name: PR CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (App)
        run: bun run typecheck

      - name: Typecheck (Scripts)
        run: bun run typecheck:scripts

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
